openapi: 3.0.3
info:
  title: Library Management System API
  description: RESTful API for managing authors, books, and loans in a library.
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: Authors
    description: Author management
  - name: Books
    description: Book management
  - name: Loans
    description: Loan management

paths:
  /authors:
    get:
      tags: [Authors]
      summary: List all authors
      operationId: listAuthors
      responses:
        "200":
          description: Array of all authors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Author"

    post:
      tags: [Authors]
      summary: Create a new author
      operationId: createAuthor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorCreate"
      responses:
        "201":
          description: Author created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"

  /authors/{id}:
    parameters:
      - $ref: "#/components/parameters/AuthorId"

    get:
      tags: [Authors]
      summary: Get an author by ID
      operationId: getAuthor
      responses:
        "200":
          description: Author found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Authors]
      summary: Update an author
      operationId: updateAuthor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorUpdate"
      responses:
        "200":
          description: Author updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Authors]
      summary: Delete an author (cascades to books)
      operationId: deleteAuthor
      responses:
        "204":
          description: Author deleted successfully
        "404":
          $ref: "#/components/responses/NotFound"

  /authors/{id}/books:
    parameters:
      - $ref: "#/components/parameters/AuthorId"

    get:
      tags: [Authors]
      summary: List books by a specific author
      operationId: listAuthorBooks
      responses:
        "200":
          description: Array of books by this author
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"
        "404":
          $ref: "#/components/responses/NotFound"

  /books:
    get:
      tags: [Books]
      summary: List all books
      description: Supports optional filtering by author_id query parameter.
      operationId: listBooks
      parameters:
        - name: author_id
          in: query
          required: false
          schema:
            type: integer
          description: Filter books by author ID
      responses:
        "200":
          description: Array of books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"

    post:
      tags: [Books]
      summary: Create a new book
      operationId: createBook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookCreate"
      responses:
        "201":
          description: Book created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Author not found — the provided author_id does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /books/{id}:
    parameters:
      - $ref: "#/components/parameters/BookId"

    get:
      tags: [Books]
      summary: Get a book by ID including author details
      operationId: getBook
      responses:
        "200":
          description: Book found with nested author object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookWithAuthor"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Books]
      summary: Update a book
      operationId: updateBook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookUpdate"
      responses:
        "200":
          description: Book updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Books]
      summary: Delete a book
      operationId: deleteBook
      responses:
        "204":
          description: Book deleted successfully
        "404":
          $ref: "#/components/responses/NotFound"

  /loans:
    get:
      tags: [Loans]
      summary: List all loans
      description: Supports optional filtering by returned query parameter.
      operationId: listLoans
      parameters:
        - name: returned
          in: query
          required: false
          schema:
            type: string
            enum: ["true", "false"]
          description: >
            Filter loans by return status.
            "true" returns only returned loans, "false" returns only active loans.
      responses:
        "200":
          description: Array of loans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Loan"

    post:
      tags: [Loans]
      summary: Check out a book (create a loan)
      operationId: createLoan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoanCreate"
      responses:
        "201":
          description: Loan created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"
        "404":
          description: Book not found — the provided book_id does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Book is already on active loan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /loans/{id}/return:
    parameters:
      - $ref: "#/components/parameters/LoanId"

    patch:
      tags: [Loans]
      summary: Return a book (mark loan as returned)
      operationId: returnLoan
      responses:
        "200":
          description: Book returned successfully — returned_at is set to today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Loan already returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  parameters:
    AuthorId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Author ID

    BookId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Book ID

    LoanId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Loan ID

  schemas:
    Author:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: George Orwell
        bio:
          type: string
          nullable: true
          example: English novelist best known for dystopian fiction.

    AuthorCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Ursula K. Le Guin
        bio:
          type: string
          example: American author of speculative fiction.

    AuthorUpdate:
      type: object
      properties:
        name:
          type: string
          example: George Orwell (updated)
        bio:
          type: string
          example: Updated biography.

    Book:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "1984"
        year:
          type: integer
          nullable: true
          example: 1949
        author_id:
          type: integer
          example: 1

    BookWithAuthor:
      allOf:
        - $ref: "#/components/schemas/Book"
        - type: object
          properties:
            author:
              $ref: "#/components/schemas/Author"

    BookCreate:
      type: object
      required: [title, author_id]
      properties:
        title:
          type: string
          example: The Left Hand of Darkness
        year:
          type: integer
          example: 1969
        author_id:
          type: integer
          example: 1

    BookUpdate:
      type: object
      properties:
        title:
          type: string
          example: The Left Hand of Darkness (Updated)
        year:
          type: integer
          example: 1970
        author_id:
          type: integer
          example: 2

    Loan:
      type: object
      properties:
        id:
          type: integer
          example: 1
        book_id:
          type: integer
          example: 1
        borrower_name:
          type: string
          example: Alice Johnson
        loaned_at:
          type: string
          format: date
          example: "2024-01-10"
        returned_at:
          type: string
          format: date
          nullable: true
          example: null

    LoanCreate:
      type: object
      required: [book_id, borrower_name]
      properties:
        book_id:
          type: integer
          example: 5
        borrower_name:
          type: string
          example: Carol White

    Error:
      type: object
      properties:
        error:
          type: string
          example: Resource not found

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
